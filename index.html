<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuo's Learning Material</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --hover: #f0f1f3;
      --max-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(92%, var(--max-width));
      margin: 0 auto;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }

    .topbar .container {
      padding: 24px 0;
    }

    .site-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .site-subtitle {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    main .container {
      padding: 48px 0 72px;
    }

    .topics {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--line);
    }

    .topic {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
      transition: background 0.15s ease;
    }

    .topic:hover {
      background: var(--hover);
    }

    .topic-left h2 {
      margin: 0 0 6px;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .topic-left p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .arrow {
      font-size: 1.5rem;
      color: var(--muted);
      padding-left: 24px;
      flex-shrink: 0;
    }

    @media (max-width: 700px) {
      .site-title {
        font-size: 1.6rem;
      }

      .site-subtitle {
        font-size: 0.9rem;
      }

      .topic {
        align-items: flex-start;
        gap: 16px;
      }

      .topic-left h2 {
        font-size: 1.4rem;
      }

      .arrow {
        padding-left: 0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="site-title">Learning Material</div>
      <div class="site-subtitle">Shuo Guo</div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="topics">
        <a class="topic" href="data-science.html">
          <div class="topic-left">
            <h2>Data Science</h2>
            <p>DS.</p>
          </div>
          <div class="arrow">→</div>
        </a>

        <a class="topic" href="optimization.html">
          <div class="topic-left">
            <h2>Optimization</h2>
            <p>From beginning to graduate</p>
          </div>
          <div class="arrow">→</div>
        </a>

        <a class="topic" href="statistics.html">
          <div class="topic-left">
            <h2>Statistics</h2>
            <p>Probability</p>
          </div>
          <div class="arrow">→</div>
        </a>
      </section>
    </div>
  </main>
</body>
</html>
